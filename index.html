<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Camera Studio Pro</title>
    <style>
        :root {
            /* Default Light Mode Palette */
            --bg-color: #ffffff;
            --panel-bg: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb; /* Professional Blue */
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --overlay-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: #334155;
            --overlay-bg: rgba(15, 23, 42, 0.98);
            --input-bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        header {
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        
        header h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Viewfinder */
        #viewport {
            flex: 1;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #sensor-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Controls Panel */
        #controls-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        #btn-capture {
            background-color: var(--accent);
            color: white;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 4px;
        }

        #btn-capture:active {
            transform: scale(0.98);
        }

        /* Overlays */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; 
            height: 100dvh; 
            background: var(--bg-color);
            z-index: 100;
            flex-direction: column;
        }

        #settings-screen {
            padding: 24px;
            padding-top: calc(24px + env(safe-area-inset-top, 0px));
            overflow-y: auto;
        }

        .settings-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .settings-info {
            background: rgba(37, 99, 235, 0.05);
            border-left: 4px solid var(--accent);
            padding: 16px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        #photo-output {
            flex: 1;
            object-fit: contain;
            background: #000;
        }

        .preview-bar {
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            display: flex;
            gap: 12px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
        }

        .secondary-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>Camera Studio Pro</h1>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn" title="Toggle Theme">☀️</button>
            <button id="btn-settings-open" class="icon-btn" title="Setup API">⚙️</button>
        </div>
    </header>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="sensor-tag">Initializing...</div>
    </div>

    <div id="controls-panel">
        <div class="control-group">
            <label>Resolution</label>
            <select id="res-selector">
                <option value="high" id="opt-high">High Quality</option>
                <option value="medium" id="opt-medium">Medium Quality</option>
                <option value="low" id="opt-low">Low Quality</option>
                <option value="veryLow" id="opt-veryLow">Performance Mode</option>
                <option value="extremelyLow" id="opt-extremelyLow">Thumbnail Mode</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Storage Priority</label>
            <select id="storage-mode">
                <option value="local" selected>Download to Local Device</option>
                <option value="cloud">Sync to Cloud Storage (R2)</option>
                <option value="both">Download & Sync to Cloud</option>
            </select>
        </div>
        
        <button id="btn-capture">Capture Image</button>
    </div>

    <canvas id="proc-canvas" style="display: none;"></canvas>

    <!-- Preview Overlay -->
    <div id="preview-screen" class="fullscreen-overlay">
        <img id="photo-output" src="" alt="Captured Image">
        <div class="preview-bar">
            <button id="btn-retake" class="secondary-btn">Discard</button>
            <button id="btn-save-final" style="flex: 2; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600;">Manual Download</button>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-screen" class="fullscreen-overlay">
        <div class="settings-header">API Configuration</div>
        
        <div class="settings-info">
            Configure your Cloudflare Worker endpoint to enable secure background synchronization to your R2 bucket.
        </div>

        <div class="control-group" style="margin-bottom: 20px;">
            <label>Worker ID</label>
            <input type="text" id="input-worker-name" placeholder="e.g. orange-leaf-8368">
        </div>

        <div class="control-group">
            <label>Subdomain</label>
            <input type="text" id="input-subdomain" placeholder="e.g. your-account.workers.dev">
        </div>

        <button id="btn-save-settings" style="background: var(--accent); color: white; width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 600; margin-top: 30px;">Save Configuration</button>
        <button id="btn-cancel-settings" class="secondary-btn" style="width: 100%; margin-top: 12px;">Back to Camera</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d');
        const sensorTag = document.getElementById('sensor-tag');
        const resSelector = document.getElementById('res-selector');
        const storageModeSelector = document.getElementById('storage-mode');
        const themeToggle = document.getElementById('theme-toggle');
        
        const previewScreen = document.getElementById('preview-screen');
        const photoOutput = document.getElementById('photo-output');
        const settingsScreen = document.getElementById('settings-screen');

        let configuredWorkerUrl = "";
        const resolutions = { high: {w:0,h:0}, medium: {w:0,h:0}, low: {w:0,h:0}, veryLow: {w:0,h:0}, extremelyLow: {w:0,h:0} };

        // --- THEME MANAGEMENT ---
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme === 'light' ? '☀️' : '🌙';
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'light' ? '☀️' : '🌙';
        });

        // --- CAMERA LOGIC ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } },
                    audio: false
                });

                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    const maxW = video.videoWidth;
                    const maxH = video.videoHeight;
                    
                    resolutions.high = { w: maxW, h: maxH };
                    resolutions.medium = { w: Math.floor(maxW * 0.5), h: Math.floor(maxH * 0.5) };
                    resolutions.low = { w: Math.floor(maxW * 0.25), h: Math.floor(maxH * 0.25) };
                    resolutions.veryLow = { w: Math.floor(maxW * 0.125), h: Math.floor(maxH * 0.125) };
                    resolutions.extremelyLow = { w: Math.floor(maxW * 0.0625), h: Math.floor(maxH * 0.0625) };

                    Object.keys(resolutions).forEach(key => {
                        const opt = document.getElementById(`opt-${key}`);
                        if(opt) opt.textContent = `${opt.textContent.split('(')[0]} (${resolutions[key].w}×${resolutions[key].h})`;
                    });

                    sensorTag.innerText = `${maxW}×${maxH} PRO SENSOR`;
                };
            } catch (err) {
                sensorTag.innerText = "CAMERA ERROR";
                console.error(err);
            }
        }

        // --- DATA MANAGEMENT ---
        function loadSettings() {
            const savedWorker = localStorage.getItem('cf_worker_name') || "";
            const savedSubdomain = localStorage.getItem('cf_subdomain') || "";
            const savedMode = localStorage.getItem('storage_mode') || 'local';

            document.getElementById('input-worker-name').value = savedWorker;
            document.getElementById('input-subdomain').value = savedSubdomain;
            storageModeSelector.value = savedMode;

            if (savedWorker && savedSubdomain) {
                const cleanSub = savedSubdomain.replace('https://', '').replace('.workers.dev', '');
                configuredWorkerUrl = `https://${savedWorker}.${cleanSub}.workers.dev`;
            }
        }

        storageModeSelector.addEventListener('change', (e) => localStorage.setItem('storage_mode', e.target.value));

        document.getElementById('btn-settings-open').addEventListener('click', () => settingsScreen.style.display = 'flex');
        document.getElementById('btn-cancel-settings').addEventListener('click', () => settingsScreen.style.display = 'none');

        document.getElementById('btn-save-settings').addEventListener('click', () => {
            localStorage.setItem('cf_worker_name', document.getElementById('input-worker-name').value.trim());
            localStorage.setItem('cf_subdomain', document.getElementById('input-subdomain').value.trim());
            loadSettings();
            settingsScreen.style.display = 'none';
        });

        // --- CAPTURE & STORAGE ---
        document.getElementById('btn-capture').addEventListener('click', () => {
            const mode = resSelector.value;
            const target = resolutions[mode];
            const storageMode = storageModeSelector.value;

            if ((storageMode === 'cloud' || storageMode === 'both') && !configuredWorkerUrl) {
                alert("Please configure API settings for cloud storage.");
                settingsScreen.style.display = 'flex';
                return;
            }

            canvas.width = target.w;
            canvas.height = target.h;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const captureBtn = document.getElementById('btn-capture');
            captureBtn.disabled = true;
            captureBtn.textContent = "Processing...";

            canvas.toBlob(async (blob) => {
                const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const filename = `IMG_${ts}_${target.w}x${target.h}.jpg`;
                const localUrl = URL.createObjectURL(blob);

                try {
                    if (storageMode === 'cloud' || storageMode === 'both') {
                        await fetch(`${configuredWorkerUrl}/${filename}`, { method: 'PUT', body: blob });
                    }
                    if (storageMode === 'local' || storageMode === 'both') {
                        const link = document.createElement('a');
                        link.download = filename;
                        link.href = localUrl;
                        link.click();
                    }
                    photoOutput.src = localUrl;
                    previewScreen.style.display = 'flex';
                } catch (e) {
                    alert("Capture failed: " + e.message);
                } finally {
                    captureBtn.disabled = false;
                    captureBtn.textContent = "Capture Image";
                }
            }, 'image/jpeg', 0.92);
        });

        document.getElementById('btn-retake').addEventListener('click', () => previewScreen.style.display = 'none');
        document.getElementById('btn-save-final').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Manual_Export_${Date.now()}.jpg`;
            link.href = photoOutput.src;
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            startCamera();
            loadSettings();
        });
    </script>
</body>
</html>
