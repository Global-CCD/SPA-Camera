<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Added viewport-fit=cover to allow safe-area inset detection -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Multi-Res Camera</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #00e676; /* Vibrant Green */
            --accent-hover: #00c853;
            --danger: #ff5252;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Fixes browser navigation bar covering the bottom */
            overflow: hidden;
        }

        /* Header Info */
        header {
            padding: 15px;
            padding-top: calc(15px + env(safe-area-inset-top, 0px)); /* Accommodate top notch */
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid #333;
        }

        /* Viewfinder Section */
        #viewport {
            flex: 1;
            position: relative;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #sensor-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
        }

        /* Controls Area */
        #controls-panel {
            background-color: var(--panel-bg);
            padding: 20px 20px 35px 20px;
            /* Prevents the home swipe-indicator overlay from blocking the button */
            padding-bottom: calc(35px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            font-size: 16px;
            appearance: none;
        }

        button {
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-capture {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }

        #btn-capture:active {
            transform: scale(0.96);
            background-color: var(--accent-hover);
        }

        /* Preview Overlay */
        #preview-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; 
            height: 100vh;
            height: 100dvh; /* Applies the same dynamic sizing to the absolute overlay */
            background: #000;
            z-index: 100;
            flex-direction: column;
        }

        #photo-output {
            flex: 1;
            object-fit: contain;
            width: 100%;
        }

        .preview-bar {
            padding: 20px;
            /* Protects these buttons from mobile hardware/OS overlays */
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            display: flex;
            gap: 15px;
            background: var(--panel-bg);
        }

        #btn-save { background: var(--accent); color: #000; flex: 1; }
        #btn-retake { background: #333; color: #fff; flex: 1; }

    </style>
</head>
<body>

    <header>Multi-Res Camera Studio</header>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="sensor-tag">Detecting Sensor...</div>
    </div>

    <div id="controls-panel">
        <div class="control-group">
            <label>Capture Quality</label>
            <select id="res-selector">
                <option value="high" id="opt-high">High (Detecting...)</option>
                <option value="medium" id="opt-medium">Medium (Detecting...)</option>
                <option value="low" id="opt-low">Low (Detecting...)</option>
                <option value="veryLow" id="opt-veryLow">Very Low (Detecting...)</option>
                <option value="extremelyLow" id="opt-extremelyLow">Extremely Low (Detecting...)</option>
            </select>
        </div>
        <button id="btn-capture">CAPTURE IMAGE</button>
    </div>

    <!-- Processing Canvas -->
    <canvas id="proc-canvas" style="display: none;"></canvas>

    <!-- Preview Screen -->
    <div id="preview-screen">
        <img id="photo-output" src="" alt="Captured Image">
        <div class="preview-bar">
            <button id="btn-retake">RETAKE</button>
            <button id="btn-save">SAVE TO DEVICE</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d');
        const sensorTag = document.getElementById('sensor-tag');
        const resSelector = document.getElementById('res-selector');
        const previewScreen = document.getElementById('preview-screen');
        const photoOutput = document.getElementById('photo-output');

        // Resolution Data Store
        const resolutions = {
            high: { w: 0, h: 0 },
            medium: { w: 0, h: 0 },
            low: { w: 0, h: 0 },
            veryLow: { w: 0, h: 0 },
            extremelyLow: { w: 0, h: 0 }
        };

        async function startCamera() {
            try {
                // Request 4K ideal to force the browser to reveal max hardware sensor capability
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 4096 }, 
                        height: { ideal: 2160 } 
                    },
                    audio: false
                });

                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    const maxW = video.videoWidth;
                    const maxH = video.videoHeight;

                    // Calculate the 5 tiers of resolution
                    resolutions.high = { w: maxW, h: maxH };
                    resolutions.medium = { w: Math.floor(maxW * 0.5), h: Math.floor(maxH * 0.5) };
                    resolutions.low = { w: Math.floor(maxW * 0.25), h: Math.floor(maxH * 0.25) };
                    resolutions.veryLow = { w: Math.floor(maxW * 0.125), h: Math.floor(maxH * 0.125) };
                    resolutions.extremelyLow = { w: Math.floor(maxW * 0.0625), h: Math.floor(maxH * 0.0625) };

                    // Update UI Select Options with exact pixel counts
                    updateOption('opt-high', 'High', resolutions.high);
                    updateOption('opt-medium', 'Medium', resolutions.medium);
                    updateOption('opt-low', 'Low', resolutions.low);
                    updateOption('opt-veryLow', 'Very Low', resolutions.veryLow);
                    updateOption('opt-extremelyLow', 'Extremely Low', resolutions.extremelyLow);

                    sensorTag.innerText = `Hardware Sensor: ${maxW}x${maxH}`;
                };
            } catch (err) {
                sensorTag.innerText = "Error: Check Permissions";
                console.error(err);
            }
        }

        function updateOption(id, label, res) {
            document.getElementById(id).textContent = `${label} (${res.w} x ${res.h})`;
        }

        // Capture Action
        document.getElementById('btn-capture').addEventListener('click', () => {
            const mode = resSelector.value;
            const target = resolutions[mode];

            // Set canvas to the specific chosen resolution
            canvas.width = target.w;
            canvas.height = target.h;

            // Draw video frame into the specific canvas size (handles downscaling automatically)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Export as high quality JPEG
            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            photoOutput.src = dataUrl;
            previewScreen.style.display = 'flex';
        });

        // Retake
        document.getElementById('btn-retake').addEventListener('click', () => {
            previewScreen.style.display = 'none';
        });

        // Save to Local Device
        document.getElementById('btn-save').addEventListener('click', () => {
            const mode = resSelector.value;
            const res = resolutions[mode];
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            
            const link = document.createElement('a');
            link.download = `Photo_${mode}_${res.w}x${res.h}_${timestamp}.jpg`;
            link.href = photoOutput.src;
            link.click();

            previewScreen.style.display = 'none';
        });

        // Run on load
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
