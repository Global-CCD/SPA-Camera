<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Camera Studio Pro</title>
    <style>
        :root {
            /* Default Light Mode Palette */
            --bg-color: #ffffff;
            --panel-bg: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --overlay-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: #334155;
            --overlay-bg: rgba(15, 23, 42, 0.98);
            --input-bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        header {
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Viewfinder */
        #viewport {
            flex: 1;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }

        #viewport.loading {
            pointer-events: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #sensor-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            z-index: 1;
        }

        .loading-spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #viewport.loading .loading-spinner {
            display: block;
        }

        /* Controls Panel */
        #controls-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        #btn-capture {
            background-color: var(--accent);
            color: white;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 4px;
        }

        #btn-capture:active {
            transform: scale(0.98);
        }
        #btn-capture:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Overlays */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            background: var(--bg-color);
            z-index: 100;
            flex-direction: column;
        }

        #settings-screen {
            padding: 24px;
            padding-top: calc(24px + env(safe-area-inset-top, 0px));
            overflow-y: auto;
        }

        .settings-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .settings-info {
            background: rgba(37, 99, 235, 0.05);
            border-left: 4px solid var(--accent);
            padding: 16px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        #photo-output {
            flex: 1;
            object-fit: contain;
            background: #000;
        }

        .preview-bar {
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            display: flex;
            gap: 12px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
        }

        .secondary-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* New button styles */
        .btn-save-settings {
            background: var(--accent);
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            margin-top: 30px;
            cursor: pointer;
        }

        .btn-save-final {
            flex: 2;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Camera Studio Pro</h1>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">☀️</button>
            <button id="btn-settings-open" class="icon-btn" aria-label="Open settings">⚙️</button>
        </div>
    </header>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="loading-spinner"></div>
        <div id="sensor-tag">Initializing...</div>
    </div>

    <div id="controls-panel">
        <div class="control-group">
            <label>Resolution</label>
            <select id="res-selector">
                <option value="high">High Quality</option>
                <option value="medium">Medium Quality</option>
                <option value="low">Low Quality</option>
                <option value="veryLow">Performance Mode</option>
                <option value="extremelyLow">Thumbnail Mode</option>
            </select>
        </div>

        <div class="control-group">
            <label>Storage Priority</label>
            <select id="storage-mode">
                <option value="local" selected>Download to Local Device</option>
                <option value="cloud">Sync to Cloud Storage (R2)</option>
                <option value="both">Download & Sync to Cloud</option>
            </select>
        </div>

        <button id="btn-capture">Capture Image</button>
    </div>

    <canvas id="proc-canvas" style="display: none;"></canvas>

    <!-- Preview Overlay -->
    <div id="preview-screen" class="fullscreen-overlay">
        <img id="photo-output" src="" alt="Captured Image">
        <div class="preview-bar">
            <button id="btn-retake" class="secondary-btn">Discard</button>
            <button id="btn-save-final" class="btn-save-final">Manual Download</button>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-screen" class="fullscreen-overlay">
        <div class="settings-header">API Configuration</div>

        <div class="settings-info">
            Configure your Cloudflare Worker endpoint to enable secure background synchronization to your R2 bucket.
        </div>

        <div class="control-group" style="margin-bottom: 20px;">
            <label>Worker ID</label>
            <input type="text" id="input-worker-name" placeholder="e.g. orange-leaf-8368">
        </div>

        <div class="control-group">
            <label>Subdomain</label>
            <input type="text" id="input-subdomain" placeholder="e.g. your-account.workers.dev">
        </div>

        <button id="btn-save-settings" class="btn-save-settings">Save Configuration</button>
        <button id="btn-cancel-settings" class="secondary-btn">Back to Camera</button>
    </div>

    <script>
        // ========== CONSTANTS ==========
        const STORAGE_MODE = {
            LOCAL: 'local',
            CLOUD: 'cloud',
            BOTH: 'both'
        };

        const RESOLUTION_MODE = {
            HIGH: 'high',
            MEDIUM: 'medium',
            LOW: 'low',
            VERY_LOW: 'veryLow',
            EXTREMELY_LOW: 'extremelyLow'
        };

        const JPEG_QUALITY = 0.92; // Balanced quality/size ratio

        // ========== CACHED DOM ELEMENTS ==========
        const elements = {
            // Theme
            themeToggle: document.getElementById('theme-toggle'),

            // Camera
            video: document.getElementById('webcam'),
            canvas: document.getElementById('proc-canvas'),
            ctx: document.getElementById('proc-canvas').getContext('2d'),
            sensorTag: document.getElementById('sensor-tag'),
            viewport: document.getElementById('viewport'),

            // Controls
            resSelector: document.getElementById('res-selector'),
            storageModeSelector: document.getElementById('storage-mode'),
            captureBtn: document.getElementById('btn-capture'),

            // Overlays
            previewScreen: document.getElementById('preview-screen'),
            photoOutput: document.getElementById('photo-output'),
            settingsScreen: document.getElementById('settings-screen'),

            // Settings
            inputWorkerName: document.getElementById('input-worker-name'),
            inputSubdomain: document.getElementById('input-subdomain'),
            btnSettingsOpen: document.getElementById('btn-settings-open'),
            btnSaveSettings: document.getElementById('btn-save-settings'),
            btnCancelSettings: document.getElementById('btn-cancel-settings'),

            // Preview Actions
            btnRetake: document.getElementById('btn-retake'),
            btnSaveFinal: document.getElementById('btn-save-final')
        };

        // ========== STATE MANAGEMENT ==========
        const state = {
            configuredWorkerUrl: "",
            resolutions: {
                [RESOLUTION_MODE.HIGH]: { w: 0, h: 0 },
                [RESOLUTION_MODE.MEDIUM]: { w: 0, h: 0 },
                [RESOLUTION_MODE.LOW]: { w: 0, h: 0 },
                [RESOLUTION_MODE.VERY_LOW]: { w: 0, h: 0 },
                [RESOLUTION_MODE.EXTREMELY_LOW]: { w: 0, h: 0 }
            },
            isCameraInitialized: false,
            cameraStream: null
        };

        // ========== UTILITY FUNCTIONS ==========
        /**
         * Triggers a file download with proper cleanup
         * @param {string} url - The object URL to download
         * @param {string} filename - The name for the downloaded file
         */
        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            try {
                link.click();
            } catch (e) {
                console.error("Download failed:", e);
                alert("Download failed. Please try again.");
            } finally {
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 100);
            }
        }

        /**
         * Validates Cloudflare Worker URL components
         * @param {string} workerName - The worker ID
         * @param {string} subdomain - The subdomain
         * @returns {boolean} - True if valid
         */
        function validateWorkerUrl(workerName, subdomain) {
            if (!workerName || !subdomain) return false;
            const cleanSub = subdomain.replace(/^https?:\/\//, '').replace(/\.workers\.dev$/, '');
            return /^[a-zA-Z0-9-]+$/.test(workerName) && /^[a-zA-Z0-9.-]+$/.test(cleanSub);
        }

        /**
         * Shows/hides loading state for the viewport
         * @param {boolean} isLoading - Whether to show loading state
         */
        function setLoadingState(isLoading) {
            elements.viewport.classList.toggle('loading', isLoading);
        }

        // ========== CORE FUNCTIONALITY ==========
        /**
         * Initializes the theme based on localStorage
         */
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            elements.themeToggle.textContent = savedTheme === 'light' ? '☀️' : '🌙';
        }

        /**
         * Toggles between light and dark theme
         */
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            elements.themeToggle.textContent = newTheme === 'light' ? '☀️' : '🌙';
        }

        /**
         * Loads saved Cloudflare Worker settings from localStorage
         */
        function loadSettings() {
            const savedWorker = localStorage.getItem('cf_worker_name') || "";
            const savedSubdomain = localStorage.getItem('cf_subdomain') || "";
            elements.inputWorkerName.value = savedWorker;
            elements.inputSubdomain.value = savedSubdomain;

            if (savedWorker && savedSubdomain) {
                const cleanSub = savedSubdomain.replace(/^https?:\/\//, '').replace(/\.workers\.dev$/, '');
                state.configuredWorkerUrl = `https://${savedWorker}.${cleanSub}.workers.dev`;
            } else {
                state.configuredWorkerUrl = "";
            }
        }

        /**
         * Starts the camera and initializes resolutions
         */
        async function startCamera() {
            if (state.isCameraInitialized) return;

            setLoadingState(true);
            elements.sensorTag.textContent = "Initializing...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 4096 },
                        height: { ideal: 2160 }
                    },
                    audio: false
                });

                elements.video.srcObject = stream;
                state.cameraStream = stream;

                await new Promise((resolve) => {
                    elements.video.onloadedmetadata = () => {
                        const maxW = elements.video.videoWidth;
                        const maxH = elements.video.videoHeight;

                        // Calculate resolutions based on camera capabilities
                        state.resolutions[RESOLUTION_MODE.HIGH] = { w: maxW, h: maxH };
                        state.resolutions[RESOLUTION_MODE.MEDIUM] = { w: Math.floor(maxW * 0.5), h: Math.floor(maxH * 0.5) };
                        state.resolutions[RESOLUTION_MODE.LOW] = { w: Math.floor(maxW * 0.25), h: Math.floor(maxH * 0.25) };
                        state.resolutions[RESOLUTION_MODE.VERY_LOW] = { w: Math.floor(maxW * 0.125), h: Math.floor(maxH * 0.125) };
                        state.resolutions[RESOLUTION_MODE.EXTREMELY_LOW] = { w: Math.floor(maxW * 0.0625), h: Math.floor(maxH * 0.0625) };

                        elements.sensorTag.textContent = `${maxW}×${maxH} PRO SENSOR`;
                        state.isCameraInitialized = true;
                        resolve();
                    };
                });
            } catch (err) {
                elements.sensorTag.textContent = "CAMERA ERROR: " + err.message;
                console.error("Camera initialization failed:", err);
                throw err;
            } finally {
                setLoadingState(false);
            }
        }

        /**
         * Stops the camera stream
         */
        function stopCamera() {
            if (state.cameraStream) {
                state.cameraStream.getTracks().forEach(track => track.stop());
                state.cameraStream = null;
            }
            state.isCameraInitialized = false;
        }

        /**
         * Handles the capture process
         */
        async function handleCapture() {
            const mode = elements.resSelector.value;
            const target = state.resolutions[mode];
            const storageMode = elements.storageModeSelector.value;

            // Validate cloud storage requirements
            if ((storageMode === STORAGE_MODE.CLOUD || storageMode === STORAGE_MODE.BOTH) && !state.configuredWorkerUrl) {
                alert("Please configure API settings.");
                elements.settingsScreen.style.display = 'flex';
                return;
            }

            // Disable button during processing
            elements.captureBtn.disabled = true;
            elements.captureBtn.textContent = "Processing...";

            try {
                // Set canvas dimensions and draw image
                elements.canvas.width = target.w;
                elements.canvas.height = target.h;
                elements.ctx.drawImage(
                    elements.video,
                    0, 0,
                    elements.canvas.width,
                    elements.canvas.height
                );

                // Convert canvas to blob asynchronously
                const blob = await new Promise((resolve) => {
                    elements.canvas.toBlob(resolve, 'image/jpeg', JPEG_QUALITY);
                });

                // Generate filename with timestamp
                const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const filename = `IMG_${ts}_${target.w}x${target.h}.jpg`;
                const localUrl = URL.createObjectURL(blob);

                try {
                    // Handle cloud storage if needed
                    if (storageMode === STORAGE_MODE.CLOUD || storageMode === STORAGE_MODE.BOTH) {
                        await fetch(`${state.configuredWorkerUrl}/${filename}`, {
                            method: 'PUT',
                            body: blob
                        });
                    }

                    // Handle local download if needed
                    if (storageMode === STORAGE_MODE.LOCAL || storageMode === STORAGE_MODE.BOTH) {
                        triggerDownload(localUrl, filename);
                    }

                    // Show preview
                    elements.photoOutput.src = localUrl;
                    elements.previewScreen.style.display = 'flex';
                } catch (e) {
                    console.error("Capture error:", e);
                    alert("Sync Error: " + e.message);
                } finally {
                    // Clean up the object URL
                    URL.revokeObjectURL(localUrl);
                }
            } catch (e) {
                console.error("Capture failed:", e);
                alert("Capture failed: " + e.message);
            } finally {
                // Re-enable capture button
                elements.captureBtn.disabled = false;
                elements.captureBtn.textContent = "Capture Image";
            }
        }

        /**
         * Handles saving the final image
         */
        function handleSaveFinal() {
            if (!elements.photoOutput.src) return;

            const url = elements.photoOutput.src;
            const filename = `Export_${Date.now()}.jpg`;
            triggerDownload(url, filename);
        }

        // ========== EVENT LISTENERS ==========
        function setupEventListeners() {
            // Theme toggle
            elements.themeToggle.addEventListener('click', toggleTheme);

            // Settings
            elements.btnSettingsOpen.addEventListener('click', () => {
                elements.settingsScreen.style.display = 'flex';
            });

            elements.btnCancelSettings.addEventListener('click', () => {
                elements.settingsScreen.style.display = 'none';
            });

            elements.btnSaveSettings.addEventListener('click', () => {
                const workerName = elements.inputWorkerName.value.trim();
                const subdomain = elements.inputSubdomain.value.trim();

                if (!validateWorkerUrl(workerName, subdomain)) {
                    alert("Invalid Worker ID or Subdomain. Use only alphanumeric characters, hyphens, and periods.");
                    return;
                }

                localStorage.setItem('cf_worker_name', workerName);
                localStorage.setItem('cf_subdomain', subdomain);
                loadSettings();
                elements.settingsScreen.style.display = 'none';
            });

            // Capture
            elements.captureBtn.addEventListener('click', handleCapture);

            // Preview actions
            elements.btnRetake.addEventListener('click', () => {
                elements.previewScreen.style.display = 'none';
                // Clean up the preview image
                if (elements.photoOutput.src) {
                    URL.revokeObjectURL(elements.photoOutput.src);
                    elements.photoOutput.src = "";
                }
            });

            elements.btnSaveFinal.addEventListener('click', handleSaveFinal);
        }

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadSettings();
            setupEventListeners();
            startCamera().catch(console.error);
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
            // Clean up any remaining object URLs
            if (elements.photoOutput.src) {
                URL.revokeObjectURL(elements.photoOutput.src);
            }
        });
    </script>
</body>
</html>
