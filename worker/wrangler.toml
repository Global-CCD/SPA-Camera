name = "camera-upload-worker"
main = "src/index.js"
compatibility_date = "2024-02-01"

# Bind your R2 bucket to the worker. 
# 'binding' is the variable name used in index.js (env.MY_BUCKET)
# 'bucket_name' must exactly match the name of the bucket you created in the Cloudflare Dashboard
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "my-uploads"
